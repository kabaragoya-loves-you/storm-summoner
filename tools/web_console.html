<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Summoner Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0e14;
            --bg-terminal: #0d1117;
            --bg-input: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-dim: #6e7681;
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --success: #3fb950;
            --warning: #d29922;
            --error: #f85149;
            --prompt: #7ee787;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, var(--bg-terminal) 0%, #131920 100%);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .logo h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        button {
            font-family: 'Outfit', system-ui, sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button svg {
            width: 16px;
            height: 16px;
        }

        #connectBtn {
            background: var(--accent);
            color: #fff;
        }

        #connectBtn:hover {
            background: #79b8ff;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #connectBtn.connected {
            background: var(--success);
        }

        #disconnectBtn {
            background: var(--bg-input);
            color: var(--text);
            border: 1px solid var(--border);
        }

        #disconnectBtn:hover {
            background: var(--error);
            border-color: var(--error);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            font-size: 0.8rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 8px var(--success);
        }

        .terminal-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 1rem;
            gap: 0.5rem;
            overflow: hidden;
            min-height: 0; /* Critical for flex child to respect overflow */
        }

        #terminal {
            flex: 1;
            background: var(--bg-terminal);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.5;
            overflow-y: auto;
            overflow-x: hidden;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 0; /* Critical for flex child scrolling */
        }

        #terminal::-webkit-scrollbar {
            width: 8px;
        }

        #terminal::-webkit-scrollbar-track {
            background: var(--bg-terminal);
        }

        #terminal::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        #terminal::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }

        .line {
            margin: 0;
        }

        .line.input {
            color: var(--prompt);
        }

        .line.output {
            color: var(--text);
        }

        .line.system {
            color: var(--accent);
            font-style: italic;
        }

        .line.error {
            color: var(--error);
        }

        .line.log-i {
            color: var(--success);
        }

        .line.log-w {
            color: var(--warning);
        }

        .line.log-e {
            color: var(--error);
        }

        .input-container {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0; /* Prevent input from shrinking */
        }

        .prompt-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: var(--prompt);
            padding: 0.75rem 0;
            user-select: none;
        }

        #commandInput {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }

        #commandInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #commandInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #commandInput::placeholder {
            color: var(--text-dim);
        }

        .hint {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
            padding: 0.5rem;
            flex-shrink: 0; /* Prevent hint from shrinking */
        }

        .hint kbd {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 0.1rem 0.4rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 2L20 12L30 14L22 22L24 32L16 27L8 32L10 22L2 14L12 12L16 2Z" 
                      fill="url(#grad)" stroke="var(--accent)" stroke-width="1.5"/>
                <defs>
                    <linearGradient id="grad" x1="16" y1="2" x2="16" y2="32" gradientUnits="userSpaceOnUse">
                        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.3"/>
                        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.1"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1>Storm Summoner Console</h1>
        </div>
        <div class="controls">
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Disconnected</span>
            </div>
            <button id="connectBtn">
                <svg viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 1a.5.5 0 0 1 .5.5v6.5H15a.5.5 0 0 1 0 1H8.5v6.5a.5.5 0 0 1-1 0V9H1a.5.5 0 0 1 0-1h6.5V1.5A.5.5 0 0 1 8 1z"/>
                </svg>
                Connect
            </button>
            <button id="disconnectBtn" disabled>
                <svg viewBox="0 0 16 16" fill="currentColor">
                    <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                </svg>
                Disconnect
            </button>
        </div>
    </header>

    <div class="terminal-container">
        <div id="terminal"></div>
        <div class="input-container">
            <span class="prompt-label">&gt;</span>
            <input type="text" id="commandInput" placeholder="Type a command..." disabled autocomplete="off" spellcheck="false">
        </div>
        <div class="hint">
            Type <kbd>help</kbd> for commands, <kbd>contexts</kbd> for subsystems, <kbd>exit</kbd> to leave console mode
        </div>
    </div>

    <script>
        let port = null;
        let reader = null;
        let readableStreamClosed = null;
        let readLoopActive = false;
        let inConsoleMode = false;
        let commandHistory = [];
        let historyIndex = -1;

        const terminal = document.getElementById('terminal');
        const commandInput = document.getElementById('commandInput');
        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        function appendLine(text, className = 'output') {
            const line = document.createElement('div');
            line.className = `line ${className}`;
            
            // Color-code ESP-IDF log levels
            if (text.match(/^[IWE] \(\d+\)/) || text.match(/^[IWE] \(/)) {
                if (text.startsWith('I ')) className = 'log-i';
                else if (text.startsWith('W ')) className = 'log-w';
                else if (text.startsWith('E ')) className = 'log-e';
                line.className = `line ${className}`;
            }
            
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function setConnected(connected) {
            statusDot.classList.toggle('connected', connected);
            statusText.textContent = connected ? 'Connected' : 'Disconnected';
            connectBtn.disabled = connected;
            connectBtn.classList.toggle('connected', connected);
            disconnectBtn.disabled = !connected;
            commandInput.disabled = !connected;
            
            if (connected) {
                commandInput.focus();
            }
        }

        async function connect() {
            try {
                appendLine('Requesting USB device...', 'system');
                port = await navigator.serial.requestPort({ 
                    filters: [{ usbVendorId: 0x303A }] 
                });
                
                await port.open({ baudRate: 115200 });
                await port.setSignals({ dataTerminalReady: true, requestToSend: true });
                
                appendLine('Connected to Storm Summoner', 'system');
                setConnected(true);
                
                // Start read loop
                startReadLoop();
                
                // Wait a moment then enter console mode
                await new Promise(r => setTimeout(r, 300));
                await sendCommand('CONSOLE');
                inConsoleMode = true;
                
            } catch (err) {
                appendLine(`Connection failed: ${err.message}`, 'error');
                console.error(err);
            }
        }

        async function disconnect() {
            readLoopActive = false;
            
            try {
                // Try to send exit command if in console mode
                if (inConsoleMode && port?.writable) {
                    try {
                        await sendRaw('exit\n');
                        await new Promise(r => setTimeout(r, 100));
                    } catch (e) {
                        // Ignore - port may already be closing
                    }
                    inConsoleMode = false;
                }
                
                // Cancel the reader first - this will cause the read loop to exit
                if (reader) {
                    try {
                        await reader.cancel();
                        reader.releaseLock();
                    } catch (e) {}
                    reader = null;
                }
                
                // Wait for the stream to fully close
                if (readableStreamClosed) {
                    try {
                        await readableStreamClosed;
                    } catch (e) {}
                    readableStreamClosed = null;
                }
                
                // Now close the port
                if (port) {
                    try {
                        await port.close();
                    } catch (e) {}
                    port = null;
                }
                
                appendLine('Disconnected', 'system');
                
            } catch (err) {
                appendLine(`Disconnect error: ${err.message}`, 'error');
            } finally {
                setConnected(false);
                reader = null;
                readableStreamClosed = null;
                port = null;
            }
        }

        async function startReadLoop() {
            readLoopActive = true;
            
            const decoder = new TextDecoderStream();
            readableStreamClosed = port.readable.pipeTo(decoder.writable);
            reader = decoder.readable.getReader();

            let buffer = '';
            
            try {
                while (readLoopActive) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    if (value) {
                        buffer += value;
                        
                        // Process complete lines
                        while (buffer.includes('\n')) {
                            const newlineIndex = buffer.indexOf('\n');
                            let line = buffer.substring(0, newlineIndex);
                            buffer = buffer.substring(newlineIndex + 1);
                            
                            // Clean up the line
                            line = line.replace(/\r/g, '').trim();
                            
                            if (line) {
                                // Skip protocol responses and prompts
                                if (line === 'CONSOLE_STARTED' || line === 'CONSOLE_STOPPED') {
                                    appendLine(`[${line}]`, 'system');
                                } else if (line !== '>' && line !== '> ') {
                                    appendLine(line);
                                }
                            }
                        }
                    }
                }
            } catch (error) {
                // Only log errors if we didn't intentionally stop
                if (readLoopActive && error.name !== 'TypeError') {
                    appendLine(`Read error: ${error.message}`, 'error');
                }
            } finally {
                if (readLoopActive) {
                    // Unexpected disconnect
                    readLoopActive = false;
                    appendLine('Connection lost', 'error');
                    setConnected(false);
                    inConsoleMode = false;
                    port = null;
                }
            }
        }

        async function sendRaw(data) {
            const encoder = new TextEncoder();
            const writer = port.writable.getWriter();
            await writer.write(encoder.encode(data));
            writer.releaseLock();
        }

        async function sendCommand(cmd) {
            if (!port) return;
            
            try {
                await sendRaw(cmd + '\n');
            } catch (err) {
                appendLine(`Send error: ${err.message}`, 'error');
            }
        }

        commandInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = commandInput.value.trim();
                if (cmd) {
                    // Add to history
                    commandHistory.push(cmd);
                    historyIndex = commandHistory.length;
                    
                    // Send to device (device will echo it back)
                    await sendCommand(cmd);
                    
                    // Handle exit locally too
                    if (cmd.toLowerCase() === 'exit') {
                        inConsoleMode = false;
                        setTimeout(() => disconnect(), 500);
                    }
                }
                commandInput.value = '';
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    commandInput.value = commandHistory[historyIndex];
                    commandInput.setSelectionRange(commandInput.value.length, commandInput.value.length);
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    commandInput.value = commandHistory[historyIndex];
                } else {
                    historyIndex = commandHistory.length;
                    commandInput.value = '';
                }
            }
        });

        connectBtn.addEventListener('click', connect);
        disconnectBtn.addEventListener('click', disconnect);

        // Focus input when clicking terminal
        terminal.addEventListener('click', () => {
            if (!commandInput.disabled) {
                commandInput.focus();
            }
        });

        // Check for Web Serial support
        if (!navigator.serial) {
            appendLine('Web Serial API not supported. Please use Chrome or Edge.', 'error');
            connectBtn.disabled = true;
        } else {
            appendLine('Click "Connect" to start a console session.', 'system');
        }
    </script>
</body>
</html>
