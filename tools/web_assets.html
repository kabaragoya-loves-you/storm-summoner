<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storm Summoner Assets</title>
  
  <!-- Web Awesome -->
  <link rel="stylesheet" href="https://early.webawesome.com/webawesome@3.0.0-beta.4/dist/themes/default.css">
  <script type="module" src="https://early.webawesome.com/webawesome@3.0.0-beta.4/dist/webawesome.loader.js"></script>
  
  <!-- Stimulus -->
  <script src="https://unpkg.com/@hotwired/stimulus/dist/stimulus.umd.js"></script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-deep: #0f0f0f;
      --bg-card: #1a1a1a;
      --bg-hover: #252525;
      --bg-selected: #2d2d2d;
      --border: #333;
      --border-light: #444;
      --text: #e8e8e8;
      --text-dim: #888;
      --accent: #f59e0b;
      --accent-glow: rgba(245, 158, 11, 0.2);
      --success: #22c55e;
      --error: #ef4444;
      --folder: #60a5fa;
      --file: #a78bfa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg-deep);
      background-image: 
        radial-gradient(ellipse at top left, rgba(245, 158, 11, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at bottom right, rgba(167, 139, 250, 0.03) 0%, transparent 50%);
      color: var(--text);
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: linear-gradient(180deg, rgba(26, 26, 26, 0.95) 0%, rgba(26, 26, 26, 0.8) 100%);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    .logo h1 {
      font-family: 'Crimson Pro', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 0;
      letter-spacing: 0.02em;
    }

    .logo h1 span {
      color: var(--accent);
    }

    .connection {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: all 0.3s;
    }

    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    /* Main content */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .breadcrumb {
      flex: 1;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 0.25rem;
      min-width: 200px;
    }

    .breadcrumb button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      font-family: inherit;
      font-size: inherit;
      transition: color 0.2s;
    }

    .breadcrumb button:hover {
      color: var(--text);
    }

    .breadcrumb span {
      color: var(--text-dim);
    }

    /* File list */
    .file-list {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .file-header {
      display: grid;
      grid-template-columns: 1fr 80px 280px;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .file-item {
      display: grid;
      grid-template-columns: 1fr 80px 280px;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      align-items: center;
    }

    .file-item:last-child {
      border-bottom: none;
    }

    .file-item:hover {
      background: var(--bg-hover);
    }

    .file-item.selected {
      background: var(--bg-selected);
    }

    .file-name {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
    }

    .file-icon {
      font-size: 1.25rem;
    }

    .file-icon.folder {
      color: var(--folder);
    }

    .file-icon.file {
      color: var(--file);
    }

    .file-size {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-dim);
      text-align: right;
    }

    .file-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .file-item:hover .file-actions {
      opacity: 1;
    }

    .file-actions button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      font-family: 'Space Mono', monospace;
      transition: all 0.15s;
    }

    .file-actions button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .file-actions button.delete:hover {
      border-color: var(--error);
      color: var(--error);
    }

    /* Empty state */
    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-dim);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
    }

    .stats-bar .usage {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .usage-bar {
      width: 200px;
      height: 6px;
      background: var(--bg-deep);
      border-radius: 3px;
      overflow: hidden;
    }

    .usage-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success) 0%, var(--accent) 100%);
      transition: width 0.3s;
    }

    /* Upload zone */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem;
      text-align: center;
      margin-top: 1.5rem;
      transition: all 0.2s;
      cursor: pointer;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-glow);
    }

    .upload-zone svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      color: var(--text-dim);
    }

    .upload-zone p {
      margin: 0;
      color: var(--text-dim);
    }

    .upload-zone .hint {
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      min-width: 400px;
      max-width: 90vw;
      transform: translateY(-20px);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal {
      transform: translateY(0);
    }

    .modal h2 {
      margin: 0 0 1.5rem 0;
      font-weight: 500;
    }

    .modal input {
      width: 100%;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .modal input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    /* Log panel */
    .log-panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 1.5rem;
      overflow: hidden;
    }

    .log-header {
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .log-content {
      padding: 1rem;
      max-height: 200px;
      overflow-y: auto;
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.6;
    }

    .log-content:empty::after {
      content: "No activity yet";
      color: var(--text-dim);
    }

    .log-entry {
      color: var(--text-dim);
    }

    .log-entry.error {
      color: var(--error);
    }

    .log-entry.success {
      color: var(--success);
    }

    /* Button overrides */
    wa-button {
      --wa-button-font-family: 'Space Mono', monospace;
    }
  </style>
</head>
<body>
  <div data-controller="assets">
    <header>
      <div class="logo">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 3L22 11L31 13L24 21L26 30L18 25L10 30L12 21L5 13L14 11L18 3Z" 
                fill="url(#logoGrad)" stroke="var(--accent)" stroke-width="1.5"/>
          <defs>
            <linearGradient id="logoGrad" x1="18" y1="3" x2="18" y2="30" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.4"/>
              <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.1"/>
            </linearGradient>
          </defs>
        </svg>
        <h1>Storm <span>Assets</span></h1>
      </div>
      
      <div class="connection">
        <div class="status">
          <span class="status-dot" data-assets-target="statusDot"></span>
          <span data-assets-target="statusText">Disconnected</span>
        </div>
        <wa-button variant="brand" data-action="click->assets#connectDevice" data-assets-target="connectBtn">
          Connect
        </wa-button>
        <wa-button variant="neutral" appearance="outlined" data-action="click->assets#disconnectDevice" 
                   data-assets-target="disconnectBtn" disabled>
          Disconnect
        </wa-button>
      </div>
    </header>

    <main>
      <div class="toolbar">
        <div class="breadcrumb" data-assets-target="breadcrumb">
          <button data-action="click->assets#navigateTo" data-path="/">/assets</button>
        </div>
        
        <wa-button size="small" variant="neutral" appearance="outlined" 
                   data-action="click->assets#refresh" data-assets-target="refreshBtn" disabled>
          <wa-icon name="arrow-clockwise" slot="prefix"></wa-icon>
          Refresh
        </wa-button>
        
        <wa-button size="small" variant="neutral" appearance="outlined" 
                   data-action="click->assets#showNewFolder" data-assets-target="newFolderBtn" disabled>
          <wa-icon name="folder-plus" slot="prefix"></wa-icon>
          New Folder
        </wa-button>
        
        <wa-button size="small" variant="neutral" appearance="outlined" 
                   data-action="click->assets#selectZipFile" data-assets-target="uploadZipBtn" disabled>
          <wa-icon name="file-earmark-zip" slot="prefix"></wa-icon>
          Upload ZIP
        </wa-button>
        <input type="file" accept=".zip" hidden data-assets-target="zipInput" data-action="change->assets#extractZip">
      </div>

      <div class="file-list" data-assets-target="fileList">
        <div class="file-header">
          <span>Name</span>
          <span style="text-align: right">Size</span>
          <span style="text-align: right">Actions</span>
        </div>
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
          </svg>
          <p>Connect to view files</p>
        </div>
      </div>

      <div class="upload-zone" data-assets-target="uploadZone" 
           data-action="click->assets#selectFiles dragover->assets#dragOver dragleave->assets#dragLeave drop->assets#drop">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 4v12m0-12L8 8m4-4l4 4"/>
        </svg>
        <p>Drop files here to upload</p>
        <p class="hint">or click to select files</p>
        <input type="file" multiple hidden data-assets-target="fileInput" data-action="change->assets#uploadFiles">
      </div>

      <div class="stats-bar" data-assets-target="statsBar" style="display: none;">
        <div class="usage">
          <span>Storage:</span>
          <div class="usage-bar">
            <div class="usage-bar-fill" data-assets-target="usageBar" style="width: 0%"></div>
          </div>
          <span data-assets-target="usageText">-- / --</span>
        </div>
        <span data-assets-target="fileCount">-- files</span>
      </div>

      <div class="log-panel">
        <div class="log-header">
          <span>Activity Log</span>
          <wa-button size="small" variant="neutral" appearance="text" data-action="click->assets#clearLog">
            Clear
          </wa-button>
        </div>
        <div class="log-content" data-assets-target="logContent"></div>
      </div>
    </main>

    <!-- New Folder Modal -->
    <div class="modal-backdrop" data-assets-target="newFolderModal">
      <div class="modal">
        <h2>New Folder</h2>
        <input type="text" placeholder="Folder name" data-assets-target="newFolderInput"
               data-action="keydown.enter->assets#createFolder">
        <div class="modal-actions">
          <wa-button variant="neutral" appearance="outlined" data-action="click->assets#hideNewFolder">
            Cancel
          </wa-button>
          <wa-button variant="brand" data-action="click->assets#createFolder">
            Create
          </wa-button>
        </div>
      </div>
    </div>

    <!-- Rename Modal -->
    <div class="modal-backdrop" data-assets-target="renameModal">
      <div class="modal">
        <h2>Rename</h2>
        <input type="text" placeholder="New name" data-assets-target="renameInput"
               data-action="keydown.enter->assets#doRename">
        <div class="modal-actions">
          <wa-button variant="neutral" appearance="outlined" data-action="click->assets#hideRename">
            Cancel
          </wa-button>
          <wa-button variant="brand" data-action="click->assets#doRename">
            Rename
          </wa-button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const { Application, Controller } = Stimulus;
    const application = Application.start();

    application.register("assets", class extends Controller {
      static targets = [
        "statusDot", "statusText", "connectBtn", "disconnectBtn",
        "breadcrumb", "fileList", "refreshBtn", "newFolderBtn", "uploadZipBtn", "zipInput",
        "uploadZone", "fileInput", "statsBar", "usageBar", "usageText", "fileCount",
        "logContent", "newFolderModal", "newFolderInput", "renameModal", "renameInput"
      ];

      connect() {
        this.port = null;
        this.reader = null;
        this.writer = null;
        this.currentPath = "/";
        this.files = [];
        this.inAssetsMode = false;
        this.renameTarget = null;
      }

      // Connection management (action handlers called from buttons)
      async connectDevice() {
        try {
          this.log("Select the TinyUSB CDC port (NOT the JTAG debug port)...");
          // ESP32-P4 has two USB interfaces - we need the TinyUSB CDC one
          // The JTAG debug interface is a different port
          this.port = await navigator.serial.requestPort({
            filters: [{ usbVendorId: 0x303A }]  // Espressif devices
          });
          
          await this.port.open({ baudRate: 115200 });
          // Note: Setting DTR/RTS may trigger device reset
          await this.port.setSignals({ dataTerminalReady: true, requestToSend: true });
          
          this.log("Connected - waiting for device to initialize...");
          this.setConnected(true);
          
          // Wait for device to fully boot if it reset (boot takes ~4-5 seconds)
          await this.sleep(5000);
          await this.drainInput();
          
          await this.enterAssetsMode();
          this.log("Ready", "success");
          // Skip DF on initial connect - it times out and may cause buffer issues
          // await this.loadStats();
          await this.navigateTo({ currentTarget: { dataset: { path: "/" } } });
          
        } catch (err) {
          this.log(`Connection failed: ${err.message}`, "error");
        }
      }

      async disconnectDevice() {
        try {
          if (this.inAssetsMode) {
            await this.sendCommand("EXIT");
            this.inAssetsMode = false;
          }
          
          if (this.port) {
            await this.port.close();
            this.port = null;
          }
          
          this.log("Disconnected");
          this.setConnected(false);
          
        } catch (err) {
          this.log(`Disconnect error: ${err.message}`, "error");
        }
      }

      setConnected(connected) {
        this.statusDotTarget.classList.toggle("connected", connected);
        this.statusTextTarget.textContent = connected ? "Connected" : "Disconnected";
        this.connectBtnTarget.disabled = connected;
        this.disconnectBtnTarget.disabled = !connected;
        this.refreshBtnTarget.disabled = !connected;
        this.newFolderBtnTarget.disabled = !connected;
        this.uploadZipBtnTarget.disabled = !connected;
        this.statsBarTarget.style.display = connected ? "flex" : "none";
      }

      // Protocol
      async enterAssetsMode() {
        // Send EXIT first in case device is in CONSOLE mode from previous session
        try {
          await this.sendRaw("\n");
          await this.sleep(100);
          await this.sendRaw("EXIT\n");
          await this.sleep(500);
          await this.drainInput();
        } catch (e) {
          // Ignore errors during cleanup
        }
        
        // Send ASSETS and look for ASSETS_STARTED in response
        await this.sendRaw("ASSETS\n");
        
        // Read lines until we get ASSETS_STARTED or timeout
        const startTime = Date.now();
        while (Date.now() - startTime < 5000) {
          const line = await this.readLineDebug(500);
          if (!line) continue;
          
          if (line.includes("ASSETS_STARTED")) {
            this.inAssetsMode = true;
            return;
          }
        }
        
        throw new Error("Timeout waiting for ASSETS_STARTED");
      }
      
      async readLineDebug(timeout = 2000) {
        if (!this.port || !this.port.readable) return null;
        
        const reader = this.port.readable.getReader();
        const decoder = new TextDecoder();
        let line = "";
        const startTime = Date.now();
        
        try {
          while (Date.now() - startTime < timeout) {
            const result = await Promise.race([
              reader.read(),
              this.sleep(50).then(() => ({ timeout: true }))
            ]);
            
            if (result.timeout) continue;
            if (result.done) break;
            
            const chunk = decoder.decode(result.value, { stream: true });
            line += chunk;
            
            const newlineIdx = line.indexOf("\n");
            if (newlineIdx !== -1) {
              const result = line.substring(0, newlineIdx).replace(/\r/g, "").trim();
              return result;
            }
          }
        } finally {
          reader.releaseLock();
        }
        
        // Return whatever we have even without newline
        return line.replace(/\r/g, "").trim() || null;
      }
      
      async sendRaw(data) {
        const encoder = new TextEncoder();
        const writer = this.port.writable.getWriter();
        await writer.write(encoder.encode(data));
        writer.releaseLock();
      }

      async sendCommand(cmd, timeout = 30000) {
        if (!this.port) throw new Error("Not connected");
        
        // IMPORTANT: Acquire reader BEFORE sending command to not miss any response data
        const reader = this.port.readable.getReader();
        const decoder = new TextDecoder();
        
        try {
          // Send the command
          const encoder = new TextEncoder();
          const writer = this.port.writable.getWriter();
          await writer.write(encoder.encode(cmd + "\n"));
          writer.releaseLock();
          
          // Read response until newline or timeout
          let buffer = "";
          const startTime = Date.now();
          
          while (Date.now() - startTime < timeout) {
            try {
              const { value, done } = await reader.read();
              if (done) break;
              
              if (value && value.length > 0) {
                buffer += decoder.decode(value, { stream: true });
                
                const newlineIdx = buffer.indexOf("\n");
                if (newlineIdx !== -1) {
                  return buffer.substring(0, newlineIdx).replace(/\r/g, "").trim();
                }
              }
            } catch (readErr) {
              break;
            }
          }
          
          return buffer.replace(/\r/g, "").trim();
          
        } finally {
          reader.releaseLock();
        }
      }

      async readBinary(size, timeout = 30000) {
        const reader = this.port.readable.getReader();
        const data = new Uint8Array(size);
        let received = 0;
        const startTime = Date.now();
        
        try {
          while (received < size && Date.now() - startTime < timeout) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value) {
              data.set(value.slice(0, size - received), received);
              received += Math.min(value.length, size - received);
            }
          }
        } finally {
          reader.releaseLock();
        }
        
        return data.slice(0, received);
      }

      async sendBinary(data) {
        const writer = this.port.writable.getWriter();
        const chunkSize = 1024;
        
        for (let i = 0; i < data.length; i += chunkSize) {
          const chunk = data.slice(i, i + chunkSize);
          await writer.write(chunk);
        }
        
        writer.releaseLock();
      }

      async flushInput() {
        if (!this.port || !this.port.readable) return;
        await this.sleep(100);
      }
      
      async drainInput() {
        // Read and discard any buffered data (boot messages, etc.)
        if (!this.port || !this.port.readable) return;
        
        const reader = this.port.readable.getReader();
        try {
          // Keep reading until no more data (with timeout)
          while (true) {
            const result = await Promise.race([
              reader.read(),
              this.sleep(200).then(() => ({ timeout: true }))
            ]);
            
            if (result.timeout || result.done) break;
            // Data received - keep draining
          }
        } catch (e) {
          // Ignore errors during drain
        } finally {
          reader.releaseLock();
        }
      }

      sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }

      // File operations
      async loadStats() {
        try {
          await this.sleep(100);  // Small delay before command
          const response = await this.sendCommand("DF");
          
          if (!response || response.startsWith("ERROR")) return;
          
          const stats = JSON.parse(response);
          const percent = (stats.used / stats.total * 100).toFixed(1);
          
          this.usageBarTarget.style.width = `${percent}%`;
          this.usageTextTarget.textContent = `${this.formatSize(stats.used)} / ${this.formatSize(stats.total)}`;
          
        } catch (err) {
          // DF parse error - ignore silently
        }
      }

      async navigateTo(event) {
        const path = event.currentTarget?.dataset?.path || "/";
        this.currentPath = path;
        this.updateBreadcrumb();
        await this.loadDirectory();
      }

      updateBreadcrumb() {
        const parts = this.currentPath.split("/").filter(p => p);
        let html = `<button data-action="click->assets#navigateTo" data-path="/">/assets</button>`;
        
        let accumulated = "";
        for (const part of parts) {
          accumulated += "/" + part;
          html += `<span>/</span><button data-action="click->assets#navigateTo" data-path="${accumulated}">${part}</button>`;
        }
        
        this.breadcrumbTarget.innerHTML = html;
      }

      async loadDirectory() {
        try {
          const response = await this.sendCommand(`LS ${this.currentPath}`);
          
          if (response.startsWith("ERROR")) {
            this.log(response, "error");
            return;
          }
          
          this.files = JSON.parse(response);
          this.renderFileList();
          
          const fileCount = this.files.filter(f => f.type === "file").length;
          const dirCount = this.files.filter(f => f.type === "dir").length;
          this.fileCountTarget.textContent = `${fileCount} files, ${dirCount} folders`;
          
        } catch (err) {
          this.log(`Failed to list directory: ${err.message}`, "error");
        }
      }

      renderFileList() {
        const header = `
          <div class="file-header">
            <span>Name</span>
            <span style="text-align: right">Size</span>
            <span style="text-align: right">Actions</span>
          </div>
        `;
        
        if (this.files.length === 0) {
          this.fileListTarget.innerHTML = header + `
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
              </svg>
              <p>Empty folder</p>
            </div>
          `;
          return;
        }
        
        // Filter out hidden files (starting with .) and sort: dirs first, then by name
        const sorted = [...this.files]
          .filter(f => !f.name.startsWith("."))
          .sort((a, b) => {
            if (a.type !== b.type) return a.type === "dir" ? -1 : 1;
            return a.name.localeCompare(b.name);
          });
        
        const items = sorted.map(file => {
          const isDir = file.type === "dir";
          const icon = isDir ? "folder-fill" : "file-earmark";
          const iconClass = isDir ? "folder" : "file";
          const size = isDir ? "--" : this.formatSize(file.size);
          const fullPath = this.currentPath === "/" 
            ? `/${file.name}` 
            : `${this.currentPath}/${file.name}`;
          
          return `
            <div class="file-item" data-path="${fullPath}" data-type="${file.type}" data-name="${file.name}"
                 ${isDir ? `data-action="click->assets#openFolder"` : ""}>
              <div class="file-name">
                <wa-icon name="${icon}" class="file-icon ${iconClass}"></wa-icon>
                <span>${file.name}</span>
              </div>
              <div class="file-size">${size}</div>
              <div class="file-actions">
                ${isDir ? `<button data-action="click->assets#archiveFolder" data-path="${fullPath}" data-name="${file.name}">Archive</button>` : ""}
                ${!isDir ? `<button data-action="click->assets#downloadFile" data-path="${fullPath}">Download</button>` : ""}
                <button data-action="click->assets#showRename" data-path="${fullPath}" data-name="${file.name}">Rename</button>
                <button class="delete" data-action="click->assets#deleteFile" data-path="${fullPath}">Delete</button>
              </div>
            </div>
          `;
        }).join("");
        
        this.fileListTarget.innerHTML = header + items;
      }

      openFolder(event) {
        event.preventDefault();
        event.stopPropagation();
        const path = event.currentTarget.dataset.path;
        this.navigateTo({ currentTarget: { dataset: { path } } });
      }

      async refresh() {
        await this.loadStats();
        await this.loadDirectory();
        this.log("Refreshed");
      }

      // File actions
      async downloadFile(event) {
        event.stopPropagation();
        const path = event.currentTarget.dataset.path;
        const filename = path.split("/").pop();
        
        this.log(`Downloading ${filename}...`);
        
        try {
          const response = await this.sendCommand(`GET ${path}`);
          
          if (response.startsWith("ERROR")) {
            this.log(response, "error");
            return;
          }
          
          if (!response.startsWith("SIZE ")) {
            this.log(`Unexpected response: ${response}`, "error");
            return;
          }
          
          const size = parseInt(response.split(" ")[1]);
          const data = await this.readBinary(size);
          
          // Trigger download
          const blob = new Blob([data]);
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = filename;
          a.click();
          URL.revokeObjectURL(url);
          
          this.log(`Downloaded ${filename} (${this.formatSize(size)})`, "success");
          
        } catch (err) {
          this.log(`Download failed: ${err.message}`, "error");
        }
      }

      async deleteFile(event) {
        event.stopPropagation();
        const path = event.currentTarget.dataset.path;
        const name = path.split("/").pop();
        const type = event.currentTarget.closest(".file-item")?.dataset.type;
        
        // For directories, check if empty first
        if (type === "dir") {
          try {
            const lsResponse = await this.sendCommand(`LS ${path}`);
            const contents = JSON.parse(lsResponse);
            
            if (contents.length > 0) {
              // Non-empty directory - need recursive delete
              if (!confirm(`"${name}" contains ${contents.length} item(s).\n\nDelete folder and ALL contents?`)) {
                return;
              }
              
              const response = await this.sendCommand(`RMRF ${path}`);
              if (response === "OK") {
                this.log(`Deleted ${name} and contents`, "success");
                await this.loadDirectory();
                await this.loadStats();
              } else {
                this.log(response, "error");
              }
              return;
            }
          } catch (err) {
            // If LS fails, try normal delete anyway
          }
        }
        
        // Regular delete (file or empty directory)
        if (!confirm(`Delete "${name}"?`)) return;
        
        try {
          const response = await this.sendCommand(`RM ${path}`);
          
          if (response === "OK") {
            this.log(`Deleted ${name}`, "success");
            await this.loadDirectory();
            await this.loadStats();
          } else {
            this.log(response, "error");
          }
          
        } catch (err) {
          this.log(`Delete failed: ${err.message}`, "error");
        }
      }

      async archiveFolder(event) {
        event.stopPropagation();
        const path = event.currentTarget.dataset.path;
        const folderName = event.currentTarget.dataset.name;
        
        this.log(`Creating archive of ${folderName}...`);
        
        try {
          // Send ZIP command and wait for response (archive creation can take time)
          const response = await this.sendCommand(`ZIP ${path}`, 60000);
          
          if (response.startsWith("ERROR")) {
            this.log(response, "error");
            return;
          }
          
          if (!response.startsWith("SIZE ")) {
            this.log(`Unexpected response: ${response}`, "error");
            return;
          }
          
          const size = parseInt(response.split(" ")[1]);
          this.log(`Archive size: ${this.formatSize(size)}, downloading...`);
          
          // Read binary data
          const data = await this.readBinary(size, 60000);
          
          if (data.length !== size) {
            this.log(`Incomplete download: ${data.length}/${size} bytes`, "error");
            return;
          }
          
          // Trigger download
          const blob = new Blob([data], { type: "application/zip" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${folderName}.zip`;
          a.click();
          URL.revokeObjectURL(url);
          
          this.log(`Downloaded ${folderName}.zip (${this.formatSize(size)})`, "success");
          
        } catch (err) {
          this.log(`Archive failed: ${err.message}`, "error");
        }
      }

      selectZipFile() {
        this.zipInputTarget.click();
      }

      async extractZip(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        // Reset the input so the same file can be selected again
        event.target.value = "";
        
        const destPath = this.currentPath;
        this.log(`Uploading ${file.name} (${this.formatSize(file.size)}) for extraction...`);
        
        try {
          // Read the file
          const data = new Uint8Array(await file.arrayBuffer());
          
          // Send EXTRACT command
          const response = await this.sendCommand(`EXTRACT ${destPath} ${data.length}`);
          
          if (response !== "READY") {
            this.log(`Device not ready: ${response}`, "error");
            return;
          }
          
          // Send ZIP data using the proper sendBinary method
          await this.sendBinary(data);
          
          this.log("Extracting...");
          
          // Wait for extraction result (can take time)
          const result = await this.readLine(60000);
          
          if (result === "OK") {
            this.log(`Extracted ${file.name} to ${destPath}`, "success");
            await this.loadDirectory();
            await this.loadStats();
          } else {
            this.log(`Extraction failed: ${result}`, "error");
          }
          
        } catch (err) {
          this.log(`Extract failed: ${err.message}`, "error");
        }
      }

      showRename(event) {
        event.stopPropagation();
        this.renameTarget = event.currentTarget.dataset.path;
        this.renameInputTarget.value = event.currentTarget.dataset.name;
        this.renameModalTarget.classList.add("open");
        this.renameInputTarget.focus();
        this.renameInputTarget.select();
      }

      hideRename() {
        this.renameModalTarget.classList.remove("open");
        this.renameTarget = null;
      }

      async doRename() {
        const newName = this.renameInputTarget.value.trim();
        if (!newName || !this.renameTarget) return;
        
        const dir = this.renameTarget.substring(0, this.renameTarget.lastIndexOf("/"));
        const newPath = dir + "/" + newName;
        
        try {
          const response = await this.sendCommand(`MV ${this.renameTarget} ${newPath}`);
          
          if (response === "OK") {
            this.log(`Renamed to ${newName}`, "success");
            this.hideRename();
            await this.loadDirectory();
          } else {
            this.log(response, "error");
          }
          
        } catch (err) {
          this.log(`Rename failed: ${err.message}`, "error");
        }
      }

      // New folder
      showNewFolder() {
        this.newFolderInputTarget.value = "";
        this.newFolderModalTarget.classList.add("open");
        this.newFolderInputTarget.focus();
      }

      hideNewFolder() {
        this.newFolderModalTarget.classList.remove("open");
      }

      async createFolder() {
        const name = this.newFolderInputTarget.value.trim();
        if (!name) return;
        
        const path = this.currentPath === "/" ? `/${name}` : `${this.currentPath}/${name}`;
        
        try {
          const response = await this.sendCommand(`MKDIR ${path}`);
          
          if (response === "OK") {
            this.log(`Created folder ${name}`, "success");
            this.hideNewFolder();
            await this.loadDirectory();
          } else {
            this.log(response, "error");
          }
          
        } catch (err) {
          this.log(`Create folder failed: ${err.message}`, "error");
        }
      }

      // Upload
      dragOver(event) {
        event.preventDefault();
        this.uploadZoneTarget.classList.add("dragover");
      }

      dragLeave(event) {
        event.preventDefault();
        this.uploadZoneTarget.classList.remove("dragover");
      }

      drop(event) {
        event.preventDefault();
        this.uploadZoneTarget.classList.remove("dragover");
        
        const files = event.dataTransfer.files;
        if (files.length) this.doUpload(files);
      }

      selectFiles() {
        this.fileInputTarget.click();
      }

      uploadFiles(event) {
        const files = event.target.files;
        if (files.length) this.doUpload(files);
        event.target.value = "";  // Reset for next upload
      }

      async doUpload(files) {
        for (const file of files) {
          await this.uploadFile(file);
        }
        await this.loadDirectory();
        await this.loadStats();
      }

      async uploadFile(file) {
        const remotePath = this.currentPath === "/" 
          ? `/${file.name}` 
          : `${this.currentPath}/${file.name}`;
        
        this.log(`Uploading ${file.name} (${this.formatSize(file.size)})...`);
        
        try {
          const response = await this.sendCommand(`PUT ${remotePath} ${file.size}`);
          
          if (response !== "READY") {
            this.log(`Upload failed: ${response}`, "error");
            return;
          }
          
          // Send binary data and wait for OK
          const data = new Uint8Array(await file.arrayBuffer());
          await this.sendBinary(data);
          
          // Read the OK response
          const result = await this.readLine(30000);
          
          if (result === "OK") {
            this.log(`Uploaded ${file.name}`, "success");
          } else {
            this.log(`Upload failed: ${result}`, "error");
          }
          
        } catch (err) {
          this.log(`Upload failed: ${err.message}`, "error");
        }
      }
      
      // Read a single line response (used after binary operations)
      async readLine(timeout = 10000) {
        const reader = this.port.readable.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        const startTime = Date.now();
        
        try {
          while (Date.now() - startTime < timeout) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value) {
              buffer += decoder.decode(value, { stream: true });
              const idx = buffer.indexOf("\n");
              if (idx !== -1) {
                return buffer.substring(0, idx).replace(/\r/g, "").trim();
              }
            }
          }
          return buffer.replace(/\r/g, "").trim();
        } finally {
          reader.releaseLock();
        }
      }

      // Logging
      log(message, type = "") {
        const entry = document.createElement("div");
        entry.className = `log-entry ${type}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        this.logContentTarget.appendChild(entry);
        this.logContentTarget.scrollTop = this.logContentTarget.scrollHeight;
      }

      clearLog() {
        this.logContentTarget.innerHTML = "";
      }

      // Utilities
      formatSize(bytes) {
        if (bytes === 0) return "0 B";
        const units = ["B", "KB", "MB", "GB"];
        const exp = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        return `${(bytes / Math.pow(1024, exp)).toFixed(exp === 0 ? 0 : 1)} ${units[exp]}`;
      }
    });

    // Check for Web Serial support
    if (!navigator.serial) {
      document.body.innerHTML = `
        <div style="display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 2rem;">
          <div>
            <h1 style="color: var(--error); margin-bottom: 1rem;">Web Serial API Not Supported</h1>
            <p style="color: var(--text-dim);">Please use Chrome or Edge browser to access this tool.</p>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
