<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storm Summoner Updater</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        .card { border: 1px solid #ccc; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        button { cursor: pointer; padding: 0.5rem 1rem; font-size: 1rem; }
        button.reset { background-color: #ff9800; color: white; border: none; border-radius: 4px; }
        button.reset:hover { background-color: #f57c00; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        #log { background: #f0f0f0; padding: 1rem; border-radius: 4px; height: 200px; overflow-y: auto; font-family: monospace; white-space: pre-wrap; }
        .progress-bar { height: 20px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; background: #4caf50; width: 0%; transition: width 0.2s; }
        .hidden { display: none; }
        h3 { margin-top: 0; }
    </style>
</head>
<body>
    <h1>Storm Summoner Updater</h1>
    
    <div class="card">
        <h3>1. Connect Device</h3>
        <p>Connect your Storm Summoner via USB.</p>
        <button id="connectBtn">Connect to Device</button>
        <span id="status">Not connected</span>
    </div>

    <div class="card hidden" id="firmwareCard">
        <h3>2. Update Firmware</h3>
        <p>Select <code>storm-summoner.bin</code></p>
        <input type="file" id="fwInput" accept=".bin">
        <br><br>
        <button id="fwBtn" disabled>Update Firmware</button>
        
        <div class="progress-bar">
            <div class="progress-fill" id="fwProgress"></div>
        </div>
    </div>

    <div class="card hidden" id="assetsCard">
        <h3>3. Update Assets</h3>
        <p>Select <code>assets.bin</code> (This may take several minutes)</p>
        <input type="file" id="assetsInput" accept=".bin">
        <br><br>
        <button id="assetsBtn" disabled>Update Assets</button>
        
        <div class="progress-bar">
            <div class="progress-fill" id="assetsProgress"></div>
        </div>
    </div>

    <div class="card hidden" id="resetCard">
        <h3>4. Reset Device</h3>
        <p>Restart the device to apply changes.</p>
        <button id="resetBtn" class="reset">Reset Device</button>
    </div>

    <div id="log"></div>

    <script>
        let port;
        let reader;
        let updateInProgress = false;
        let currentType = ""; // "FIRMWARE" or "ASSETS"

        const connectBtn = document.getElementById('connectBtn');
        const statusSpan = document.getElementById('status');
        const logDiv = document.getElementById('log');
        
        // Firmware elements
        const fwCard = document.getElementById('firmwareCard');
        const fwInput = document.getElementById('fwInput');
        const fwBtn = document.getElementById('fwBtn');
        const fwProgress = document.getElementById('fwProgress');

        // Assets elements
        const assetsCard = document.getElementById('assetsCard');
        const assetsInput = document.getElementById('assetsInput');
        const assetsBtn = document.getElementById('assetsBtn');
        const assetsProgress = document.getElementById('assetsProgress');

        // Reset elements
        const resetCard = document.getElementById('resetCard');
        const resetBtn = document.getElementById('resetBtn');

        function log(msg) {
            console.log(msg);
            logDiv.textContent += msg + '\n';
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function connect() {
            try {
                port = await navigator.serial.requestPort({ filters: [{ usbVendorId: 0x303A }] });
                await port.open({ baudRate: 115200 });
                await port.setSignals({ dataTerminalReady: true, requestToSend: true });
                
                statusSpan.textContent = "Connected!";
                statusSpan.style.color = "green";
                connectBtn.disabled = true;
                
                fwCard.classList.remove('hidden');
                assetsCard.classList.remove('hidden');
                resetCard.classList.remove('hidden');
                
                // Re-enable controls based on current file selection
                setControlsEnabled(true);
                
                log("Connected to " + port.getInfo().usbVendorId);
                
                readLoop();
            } catch (err) {
                log("Error connecting: " + err.message);
            }
        }

        async function readLoop() {
            const decoder = new TextDecoderStream();
            const inputDone = port.readable.pipeTo(decoder.writable);
            const inputStream = decoder.readable;
            reader = inputStream.getReader();

            try {
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) handleData(value);
                }
            } catch (error) {
                log("Read error: " + error);
            } finally {
                reader.releaseLock();
                handleDisconnect();
            }
        }

        function handleDisconnect() {
            log("Device disconnected");
            statusSpan.textContent = "Not connected";
            statusSpan.style.color = ""; // Default color
            
            connectBtn.disabled = false;
            
            // Hide or disable controls
            // fwCard.classList.add('hidden');
            // assetsCard.classList.add('hidden');
            // resetCard.classList.add('hidden');
            
            // Or just disable buttons
            setControlsEnabled(false);
            
            port = null;
        }

        let rxBuffer = "";
        function handleData(data) {
            rxBuffer += data;
            if (rxBuffer.includes('\n')) {
                let lines = rxBuffer.split('\n');
                rxBuffer = lines.pop(); 

                for (let line of lines) {
                    line = line.trim();
                    if (!line) continue;
                    log("DEVICE: " + line);
                    
                    // Determine which progress bar to update
                    const activeProgress = (currentType === "FIRMWARE") ? fwProgress : assetsProgress;

                    if (line.startsWith("PROGRESS")) {
                        const pct = parseInt(line.split(' ')[1]);
                        if (activeProgress) activeProgress.style.width = pct + "%";
                    } else if (line === "READY") {
                        log("Device Ready. Starting upload...");
                        uploadChunks();
                    } else if (line === "TRANSFER_COMPLETE") {
                        log("Transfer complete. Committing...");
                        send("COMMIT");
                    } else if (line === "SUCCESS") {
                        log("Update Successful!");
                        // alert(`${currentType} Update Successful!`);
                        setControlsEnabled(true);
                        updateInProgress = false;
                        currentType = "";
                    } else if (line === "RESETTING") {
                        log("Device is resetting...");
                        // alert("Device is resetting. You may need to reconnect.");
                        // The read loop will catch the disconnect
                    } else if (line.startsWith("ERROR")) {
                        updateInProgress = false;
                        currentType = "";
                        setControlsEnabled(true);
                        log("Update Error: " + line);
                        // alert("Update Error: " + line);
                    }
                }
            }
        }

        async function send(data) {
            log("HOST: " + data);
            const encoder = new TextEncoder();
            const writer = port.writable.getWriter();
            await writer.write(encoder.encode(data + "\n"));
            writer.releaseLock();
        }

        let uploadData = null;

        function setControlsEnabled(enabled) {
            fwBtn.disabled = !enabled || !fwInput.files[0];
            assetsBtn.disabled = !enabled || !assetsInput.files[0];
            resetBtn.disabled = !enabled;
            fwInput.disabled = !enabled;
            assetsInput.disabled = !enabled;
        }

        async function startUpdate(type) {
            if (!port) return;
            
            const input = (type === "FIRMWARE") ? fwInput : assetsInput;
            const file = input.files[0];
            if (!file) return;

            updateInProgress = true;
            currentType = type;
            setControlsEnabled(false);
            
            // Reset progress bars
            fwProgress.style.width = "0%";
            assetsProgress.style.width = "0%";
            
            const buffer = await file.arrayBuffer();
            uploadData = new Uint8Array(buffer);
            
            log(`Starting ${type} update: ${file.name} (${uploadData.length} bytes)`);
            
            // Send start command
            send(`${type} ${uploadData.length}`);
        }

        async function uploadChunks() {
            const writer = port.writable.getWriter();
            const chunkSize = 4096; // Send larger chunks
            
            try {
                log("Writing binary data...");
                for (let i = 0; i < uploadData.length; i += chunkSize) {
                    const chunk = uploadData.slice(i, i + chunkSize);
                    await writer.write(chunk);
                    
                    // Local progress update (optional, helps visualize upload speed vs device flash speed)
                    if (i % (chunkSize * 10) === 0) {
                         // const pct = Math.floor((i + chunk.length) / uploadData.length * 100);
                         // log(`Uploaded ${pct}%`);
                    }
                }
            } catch (err) {
                log("Upload error: " + err);
            } finally {
                writer.releaseLock();
            }
            log("Upload finished, waiting for device...");
        }

        async function triggerReset() {
            // if (confirm("Are you sure you want to reset the device?")) {
                send("RESET");
            // }
        }

        connectBtn.addEventListener('click', connect);
        
        fwBtn.addEventListener('click', () => startUpdate("FIRMWARE"));
        assetsBtn.addEventListener('click', () => startUpdate("ASSETS"));
        resetBtn.addEventListener('click', triggerReset);
        
        fwInput.addEventListener('change', () => {
            if (!updateInProgress) fwBtn.disabled = !fwInput.files[0];
        });
        
        assetsInput.addEventListener('change', () => {
            if (!updateInProgress) assetsBtn.disabled = !assetsInput.files[0];
        });

        if (!navigator.serial) {
            log("Web Serial API not supported. Use Chrome/Edge.");
            connectBtn.disabled = true;
        }
    </script>
</body>
</html>
